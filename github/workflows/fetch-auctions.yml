name: Fetch Treasury Auctions

on:
  schedule:
    - cron: '0 */4 * * *'   # 매 4시간 (UTC 기준 0, 4, 8, 12, 16, 20시)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Treasury Auction Data
        run: |
          mkdir -p data

          # upcoming: Bill, Note, Bond, TIPS, FRN
          for TYPE in Bill Note Bond TIPS FRN; do
            curl -sf "https://www.treasurydirect.gov/TA_WS/securities/upcoming?format=jsonp&limitByTerm=true&type=${TYPE}&callback=cb" \
              | sed 's/^cb(//; s/)$//' > /tmp/upcoming_${TYPE}.json || echo '[]' > /tmp/upcoming_${TYPE}.json
          done

          # auctioned (최근 낙찰 완료): Bill, Note, Bond
          for TYPE in Bill Note Bond; do
            curl -sf "https://www.treasurydirect.gov/TA_WS/securities/auctioned?format=jsonp&limitByTerm=true&type=${TYPE}&callback=cb" \
              | sed 's/^cb(//; s/)$//' > /tmp/auctioned_${TYPE}.json || echo '[]' > /tmp/auctioned_${TYPE}.json
          done

          # Node.js로 병합 및 정리
          node -e "
            const fs = require('fs');
            const readJson = (f) => { try { return JSON.parse(fs.readFileSync(f,'utf8')); } catch(e) { return []; } };

            const upcoming = [
              ...readJson('/tmp/upcoming_Bill.json'),
              ...readJson('/tmp/upcoming_Note.json'),
              ...readJson('/tmp/upcoming_Bond.json'),
              ...readJson('/tmp/upcoming_TIPS.json'),
              ...readJson('/tmp/upcoming_FRN.json'),
            ].map(a => ({
              type:        a.securityType || '',
              term:        a.securityTerm || '',
              auctionDate: (a.auctionDate || '').slice(0, 10),
              issueDate:   (a.issueDate   || '').slice(0, 10),
              maturityDate:(a.maturityDate|| '').slice(0, 10),
              offeringAmt: parseFloat(a.offeringAmount) || 0,
              cusip:       a.cusip || '',
            })).sort((a, b) => (a.issueDate || '').localeCompare(b.issueDate || ''));

            const auctioned = [
              ...readJson('/tmp/auctioned_Bill.json'),
              ...readJson('/tmp/auctioned_Note.json'),
              ...readJson('/tmp/auctioned_Bond.json'),
            ].map(a => ({
              type:        a.securityType || '',
              term:        a.securityTerm || '',
              auctionDate: (a.auctionDate || '').slice(0, 10),
              issueDate:   (a.issueDate   || '').slice(0, 10),
              offeringAmt: parseFloat(a.offeringAmount) || 0,
              highRate:    a.highRate || a.highYield || null,
              cusip:       a.cusip || '',
            })).sort((a, b) => (b.auctionDate || '').localeCompare(a.auctionDate || '')).slice(0, 20);

            const output = {
              updated:   new Date().toISOString(),
              upcoming,
              auctioned,
            };

            fs.writeFileSync('data/auctions.json', JSON.stringify(output, null, 2));
            console.log('upcoming:', upcoming.length, '/ auctioned:', auctioned.length);
          "

      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auctions.json
          git diff --staged --quiet || git commit -m "chore: update auctions data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
